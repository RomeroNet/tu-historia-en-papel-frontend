apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.name }}
  labels:
    app: {{ .Values.name }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.gateway.clusterIssuer | quote }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}

  listeners:
    - name: http
      hostname: {{ .Values.gateway.hostname | quote }}
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same

    - name: https
      hostname: {{ .Values.gateway.hostname | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.gateway.tlsSecretName }}
      allowedRoutes:
        namespaces:
          from: Same
