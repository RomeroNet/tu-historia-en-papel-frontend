{{- $hostnames := .Values.gateway.hostnames | default (list .Values.gateway.hostname) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}-http
  labels:
    app: {{ .Values.name }}
spec:
  parentRefs:
{{- range $index, $_ := $hostnames }}
    - name: {{ $.Values.name }}
      sectionName: http-{{ $index }}
{{- end }}

  hostnames:
{{- range $hostnames }}
    - {{ . | quote }}
{{- end }}

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
