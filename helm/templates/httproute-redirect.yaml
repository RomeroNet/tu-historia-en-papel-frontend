apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}-http
  labels:
    app: {{ .Values.name }}
spec:
  parentRefs:
    - name: {{ .Values.name }}
      sectionName: http

  hostnames:
    - {{ .Values.gateway.hostname | quote }}

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
