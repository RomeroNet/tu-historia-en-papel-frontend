{{- $hostnames := .Values.gateway.hostnames | default (list .Values.gateway.hostname) }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}-https
  labels:
    app: {{ .Values.name }}
spec:
  parentRefs:
{{- range $index, $_ := $hostnames }}
    - name: {{ $.Values.name }}
      sectionName: https-{{ $index }}
{{- end }}

  hostnames:
{{- range $hostnames }}
    - {{ . | quote }}
{{- end }}

  rules:
    - backendRefs:
        - name: {{ .Values.name }}
          port: {{ .Values.service.port }}
