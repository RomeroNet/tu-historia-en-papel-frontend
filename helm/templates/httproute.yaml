apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}-https
  labels:
    app: {{ .Values.name }}
spec:
  parentRefs:
    - name: {{ $.Values.name }}
      sectionName: https-0

  hostnames:
    - {{ .Values.gateway.hostname | quote }}

  rules:
    - backendRefs:
        - name: {{ .Values.name }}
          port: {{ .Values.service.port }}
