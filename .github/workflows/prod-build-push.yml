name: Build and push production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  USER: romeronet
  REPOSITORY: tu-historia-en-papel-frontend
  NAMESPACE: tu-historia-en-papel

jobs:
  validate:
    name: Validate Helm chart
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up helm
        uses: azure/setup-helm@v5.0.0

      - name: Validate Helm charts
        run: helm lint --strict helm

  build-node:
    name: Build project
    runs-on: ubuntu-24.04-arm
    needs:
      - validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up BuildX
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/prod/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.USER }}/${{ env.REPOSITORY }}/node:latest

  deploy:
    name: Deploy project on Kubernetes
    runs-on: ubuntu-24.04-arm
    needs:
      - build-node

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up helm
        uses: azure/setup-helm@v5.0.0

      - name: Set up kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECTL_CONTENT }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_CONTENT" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create namespace
        run: kubectl create namespace "${{ env.NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Validate Kubernetes resources
        run: |
          helm template tu-historia-en-papel-frontend helm \
            --set-string deploymentSha="${{ github.sha }}" > /tmp/application.yaml
          kubectl apply --server-side --dry-run=server --force-conflicts -f /tmp/application.yaml

      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install \
            --namespace "${{ env.NAMESPACE }}" \
            tu-historia-en-papel-frontend helm \
            --set-string deploymentSha="${{ github.sha }}" \
            --wait \
            --timeout 5m
