name: Build and push production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  USER: romeronet
  REPOSITORY: tu-historia-en-papel-frontend
  NAMESPACE: tu-historia-en-papel
  NUXT_PUBLIC_SITE_URL: https://creahistoriastudio.com

jobs:
  validate:
    name: Validate Helm chart
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up helm
        uses: azure/setup-helm@v5.0.1

      - name: Validate Helm charts
        run: helm lint --strict helm

  build-node:
    name: Build project
    runs-on: ubuntu-24.04-arm
    needs:
      - validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up BuildX
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: docker/prod/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.USER }}/${{ env.REPOSITORY }}/node:latest
          build-args: |
            NUXT_PUBLIC_SITE_URL=${{ env.NUXT_PUBLIC_SITE_URL }}
          cache-from: type=gha,scope=production-arm64
          cache-to: type=gha,mode=max,scope=production-arm64

  deploy:
    name: Deploy project on Kubernetes
    runs-on: ubuntu-24.04-arm
    needs:
      - build-node

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5.1.0

      - name: Set up helm
        uses: azure/setup-helm@v5.0.1

      - name: Set up kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECTL_CONTENT }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_CONTENT" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create namespace
        run: kubectl create namespace "${{ env.NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Configure SMTP secret
        env:
          NUXT_SMTP_HOST: ${{ secrets.NUXT_SMTP_HOST }}
          NUXT_SMTP_USER: ${{ secrets.NUXT_SMTP_USER }}
          NUXT_SMTP_PASSWORD: ${{ secrets.NUXT_SMTP_PASSWORD }}
          NUXT_SMTP_TO: ${{ secrets.NUXT_SMTP_TO }}
        run: |
          kubectl create secret generic tu-historia-en-papel-frontend-smtp \
            --namespace "${{ env.NAMESPACE }}" \
            --from-literal=NUXT_SMTP_HOST="$NUXT_SMTP_HOST" \
            --from-literal=NUXT_SMTP_USER="$NUXT_SMTP_USER" \
            --from-literal=NUXT_SMTP_PASSWORD="$NUXT_SMTP_PASSWORD" \
            --from-literal=NUXT_SMTP_TO="$NUXT_SMTP_TO" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Validate Kubernetes resources
        run: |
          helm template tu-historia-en-papel-frontend helm \
            --set-string deploymentSha="${{ github.sha }}" \
            --set-string siteUrl="${{ env.NUXT_PUBLIC_SITE_URL }}" \
            > /tmp/application.yaml
          kubectl apply --server-side --dry-run=server --force-conflicts -f /tmp/application.yaml

      - name: Deploy to Kubernetes
        run: |
          helm upgrade --install \
            --namespace "${{ env.NAMESPACE }}" \
            tu-historia-en-papel-frontend helm \
            --set-string deploymentSha="${{ github.sha }}" \
            --set-string siteUrl="${{ env.NUXT_PUBLIC_SITE_URL }}" \
            --wait \
            --timeout 5m
